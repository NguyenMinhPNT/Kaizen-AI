name: kaizen_ai
description: "Kaizen AI — Habit formation using the Kaizen philosophy. Small, consistent, daily improvements."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Navigation
  go_router: ^14.2.0

  # Database
  drift: ^2.20.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24
  shared_preferences: ^2.3.2

  # Background Timer
  flutter_foreground_task: ^8.13.0

  # Charts & Visualization
  fl_chart: ^0.69.0

  # Animation
  lottie: ^3.1.2

  # Code Generation Annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Fonts
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.20.0
  injectable_generator: ^2.4.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/trees/
    - assets/icons/habit_icons/
